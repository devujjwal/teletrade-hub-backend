name: Backend Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-version: ['8.3']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, dom, json, mbstring, pdo, pdo_sqlite, sqlite3, xml, xmlwriter
          coverage: xdebug
      
      - name: Validate composer.json
        run: composer validate --strict --no-check-lock
      
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Create results directory
        run: mkdir -p tests/results
      
      - name: Run Unit Tests
        run: vendor/bin/phpunit --testsuite "Unit Tests" --log-junit tests/results/unit-results.xml
      
      - name: Generate Coverage Report
        run: vendor/bin/phpunit --testsuite "Unit Tests" --coverage-clover tests/results/coverage.xml --coverage-text
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/results/

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: curl, dom, json, mbstring, pdo, pdo_sqlite, sqlite3, xml, xmlwriter
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Security Audit
        run: composer audit
        continue-on-error: true
